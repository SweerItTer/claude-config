name: Test setup.sh

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: Verify setup.sh on ubuntu-24.04
    runs-on: ubuntu-24.04
    env:
      REPO_ROOT: ${{ github.workspace }}

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify user default ECC scope
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -r "$tmp"' EXIT

          output=$(CLAUDE_CONFIG_DIR="$tmp" ./setup.sh --dry-run --no-claude --no-verify 2>&1)
          echo "$output"

          printf '%s\n' "$output" | grep -q 'ECC 默认安装范围'
          printf '%s\n' "$output" | grep -q -- '--modules rules-core,agents-core'
          if printf '%s\n' "$output" | grep -q -- '--profile full'; then
            echo "FAIL: 用户默认路径不应使用 ECC full profile"
            exit 1
          fi

      - name: Run setup.sh smoke test
        run: |
          chmod +x ./setup.sh
          ./setup.sh --ci --smoke-test
        env:
          REPO_ROOT: ${{ github.workspace }}
          CLAUDE_BASE_URL: ${{ vars.CLAUDE_BASEURL }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_APIKEY }}
          CLAUDE_MODEL: deepseek-v4-flash

      - name: Verify idempotency with second run
        run: |
          set -euo pipefail
          echo "=== 第二次运行 (应主要走已就绪路径) ==="
          output=$(./setup.sh --ci 2>&1)
          echo "$output"

          pass_count=$(printf '%s\n' "$output" | grep -c '\[PASS\]' || true)
          echo "检测到 $pass_count 个 [PASS] 标记"
          if [[ "$pass_count" -lt 4 ]]; then
            echo "FAIL: 第二次运行没有体现足够的幂等性"
            exit 1
          fi
        env:
          REPO_ROOT: ${{ github.workspace }}
          CLAUDE_BASE_URL: ${{ vars.CLAUDE_BASEURL }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_APIKEY }}
          CLAUDE_MODEL: deepseek-v4-flash
