name: Test setup.sh

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: Verify setup.sh on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    env:
      REPO_ROOT: ${{ github.workspace }}

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js (for ECC npm install)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run setup.sh
        run: |
          chmod +x ./setup.sh
          ./setup.sh --ci
        env:
          REPO_ROOT: ${{ github.workspace }}

      - name: Verify idempotency — second run should skip
        run: |
          echo "=== 第二次运行 (应全部跳过) ==="
          output=$(./setup.sh --ci 2>&1)
          echo "$output"
          pass_count=$(echo "$output" | grep -c '\[PASS\]' || true)
          echo "检测到 $pass_count 个 [PASS] 跳过标记"
          if [[ "$pass_count" -lt 3 ]]; then
            echo "FAIL: 幂等性检测不足 (期望 >= 3 个 PASS, 实际 $pass_count)"
            exit 1
          fi
          echo "OK: 幂等性验证通过"
        env:
          REPO_ROOT: ${{ github.workspace }}

      - name: Verify symlinks — core config
        run: |
          set -euo pipefail
          echo "=== 核心配置符号链接 ==="
          for f in CLAUDE.md RTK.md AGENTS.md; do
            target="$HOME/.claude/$f"
            [[ -L "$target" ]] || { echo "FAIL: $target 不是符号链接"; exit 1; }
            link=$(readlink "$target")
            [[ "$link" == "$REPO_ROOT/config/claude/$f" ]] || { echo "FAIL: $target -> $link (期望 -> $REPO_ROOT/config/claude/$f)"; exit 1; }
            echo "  OK: $f -> $link"
          done

      - name: Verify symlinks — rules
        run: |
          set -euo pipefail
          target="$HOME/.claude/rules"
          [[ -L "$target" ]] || { echo "FAIL: $target 不是符号链接"; exit 1; }
          link=$(readlink "$target")
          expected="$REPO_ROOT/config/claude/rules"
          [[ "$link" == "$expected" ]] || { echo "FAIL: $target -> $link (期望 -> $expected)"; exit 1; }
          echo "OK: rules -> $link"

          # 抽样检查几个 rule 文件
          for f in common/coding-style.md common/security.md common/git-workflow.md; do
            [[ -f "$HOME/.claude/rules/$f" ]] || { echo "FAIL: rules/$f 不存在"; exit 1; }
          done
          echo "OK: rules 文件抽样通过"

      - name: Verify symlinks — agents (ECC + custom)
        run: |
          set -euo pipefail
          target="$HOME/.claude/agents"
          [[ -L "$target" ]] || { echo "FAIL: $target 不是符号链接"; exit 1; }
          link=$(readlink "$target")
          expected="$REPO_ROOT/external/everything-claude-code/agents"
          [[ "$link" == "$expected" ]] || { echo "FAIL: $target -> $link (期望 -> $expected)"; exit 1; }
          echo "OK: agents dir -> $link"

          # ECC agent 定义存在 (.kiro/agents，非 agents/)
          for f in architect.md code-reviewer.md planner.md tdd-guide.md; do
            fp="$REPO_ROOT/external/everything-claude-code/.kiro/agents/$f"
            [[ -f "$fp" ]] || { echo "FAIL: .kiro/agents/$f 不存在"; exit 1; }
          done
          echo "OK: ECC agent 定义抽样通过"

          # 自定义 agent 文件已复制 (非符号链接)
          for f in git.md progress.md rules.md validation.md; do
            fp="$target/$f"
            [[ -f "$fp" ]] || { echo "FAIL: custom agent $f 不存在"; exit 1; }
            [[ -L "$fp" ]] && { echo "FAIL: custom agent $f 是符号链接 (应为普通文件)"; exit 1; }
          done
          echo "OK: 自定义 agents (git, progress, rules, validation) 均为普通文件"

      - name: Verify symlinks — commands (ECC)
        run: |
          set -euo pipefail
          target="$HOME/.claude/commands"
          [[ -L "$target" ]] || { echo "FAIL: $target 不是符号链接"; exit 1; }
          link=$(readlink "$target")
          expected="$REPO_ROOT/external/everything-claude-code/commands"
          [[ "$link" == "$expected" ]] || { echo "FAIL: $target -> $link (期望 -> $expected)"; exit 1; }
          echo "OK: commands -> $link"

      - name: Verify skills — ECC + OMC + superpowers
        run: |
          set -euo pipefail
          sd="$HOME/.claude/skills"

          # ECC skills (符号链接)
          for name in tdd-workflow security-review plan-orchestrate; do
            sp="$sd/$name"
            [[ -d "$sp" ]] || { echo "FAIL: skill $name 目录不存在"; exit 1; }
            [[ -L "$sp" ]] || { echo "FAIL: skill $name 不是符号链接 (应为 ECC symlink)"; exit 1; }
          done
          echo "OK: ECC skills 抽样通过 (符号链接)"

          # OMC skill
          [[ -L "$sd/omc-reference" ]] || { echo "FAIL: omc-reference 不是符号链接"; exit 1; }
          echo "OK: omc-reference skill"

          # Superpowers skills (由 plugin marketplace 运行时发现，不在 skills/ 目录)
          # 验证旧版 cp -r 残留已清理
          for name in using-superpowers verification-before-completion test-driven-development; do
            sp="$sd/$name"
            [[ -d "$sp" ]] && { echo "FAIL: 旧 superpowers skill $name 仍存在 (应为 plugin 发现)"; exit 1; }
          done
          echo "OK: superpowers skills 已迁移至 plugin marketplace (无残留)"

      - name: Verify marketplace registrations
        run: |
          set -euo pipefail
          mp="$HOME/.claude/plugins/marketplaces"

          declare -A markets=(
            [omc]="oh-my-claudecode"
            [context-mode]="context-mode"
            [ecc]="everything-claude-code"
            [superpowers]="superpowers"
            [claude-plugins-official]="claude-plugins-official"
          )

          for name in "${!markets[@]}"; do
            submod="${markets[$name]}"
            target="$mp/$name"
            [[ -L "$target" ]] || { echo "FAIL: marketplace $name 不是符号链接"; exit 1; }
            link=$(readlink "$target")
            expected="$REPO_ROOT/external/$submod"
            [[ "$link" == "$expected" ]] || { echo "FAIL: $target -> $link (期望 -> $expected)"; exit 1; }
            echo "OK: marketplace $name -> $link"
          done

          # known_marketplaces.json — REPO_ROOT 已被替换
          km="$HOME/.claude/plugins/known_marketplaces.json"
          [[ -f "$km" ]] || { echo "FAIL: known_marketplaces.json 不存在"; exit 1; }
          # 确保不包含未替换的 REPO_ROOT 占位符
          if grep -q "REPO_ROOT" "$km"; then
            echo "FAIL: known_marketplaces.json 仍包含 REPO_ROOT 占位符"
            exit 1
          fi
          echo "OK: known_marketplaces.json 路径已替换"

      - name: Verify RTK binary
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          rtk --version || { echo "FAIL: rtk --version 失败"; exit 1; }
          echo "OK: RTK $(rtk --version)"

      - name: Verify RTK config
        run: |
          set -euo pipefail
          for f in config.toml filters.toml; do
            target="$HOME/.config/rtk/$f"
            [[ -L "$target" ]] || { echo "FAIL: rtk/$f 不是符号链接"; exit 1; }
            link=$(readlink "$target")
            expected="$REPO_ROOT/config/rtk/$f"
            [[ "$link" == "$expected" ]] || { echo "FAIL: $target -> $link (期望 -> $expected)"; exit 1; }
            echo "OK: rtk/$f -> $link"
          done

      - name: Verify OMC hooks in settings.json
        run: |
          set -euo pipefail
          sf="$HOME/.claude/settings.json"
          [[ -f "$sf" ]] || { echo "FAIL: settings.json 不存在"; exit 1; }
          python3 - "$sf" << 'PYEOF'
          import json, sys
          with open(sys.argv[1]) as f:
              d = json.load(f)
          hooks = d.get("hooks", {})
          expected = ["PostToolUse", "PreToolUse"]
          missing = [k for k in expected if k not in hooks]
          if missing:
              print(f"FAIL: settings.json 缺少 hook 条目: {missing}")
              print(f"  实际 hooks: {list(hooks.keys())}")
              sys.exit(1)
          print(f"OK: settings.json 包含 {len(hooks)} 个 hook 条目: {list(hooks.keys())}")
          PYEOF

      - name: Verify ECC + context-mode node_modules
        run: |
          set -euo pipefail
          for dir in everything-claude-code context-mode; do
            nm="$REPO_ROOT/external/$dir/node_modules"
            [[ -d "$nm" ]] || { echo "FAIL: $dir node_modules 不存在"; exit 1; }
            echo "OK: $dir node_modules 已安装"
          done

      - name: Verify OMC config
        run: |
          set -euo pipefail
          # wiki
          wt="$HOME/.omc/wiki"
          [[ -L "$wt" ]] || { echo "FAIL: OMC wiki 不是符号链接"; exit 1; }
          echo "OK: OMC wiki -> $(readlink "$wt")"

          # rules-injector: 仅当源目录存在时才检查 (OMC 版本间可能不存在)
          ri="$HOME/.omc/rules-injector"
          if [[ -d "$REPO_ROOT/external/oh-my-claudecode/rules-injector" ]]; then
            [[ -L "$ri" ]] || { echo "FAIL: OMC rules-injector 不是符号链接"; exit 1; }
            echo "OK: OMC rules-injector -> $(readlink "$ri")"
          else
            echo "SKIP: rules-injector (OMC 子模块中不存在此目录)"
          fi

  # ---- 可选: claude 集成测试 (需要 repo vars + secrets) ----
  claude-smoke:
    name: Claude integration test
    runs-on: ubuntu-24.04
    needs: verify
    if: ${{ vars.CLAUDE_BASEURL != '' }}
    env:
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.CLAUDE_APIKEY }}

    steps:
      - name: Check API key
        id: check
        run: |
          if [[ -z "$ANTHROPIC_AUTH_TOKEN" ]]; then
            echo "CLAUDE_APIKEY secret 未配置，跳过集成测试"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout with submodules
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run setup.sh
        if: steps.check.outputs.skip == 'false'
        run: |
          chmod +x ./setup.sh
          ./setup.sh --ci
        env:
          REPO_ROOT: ${{ github.workspace }}

      - name: Write settings.json
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p "$HOME/.claude"
          cat > "$HOME/.claude/settings.json" << 'SETEOF'
          {
            "$schema": "https://json.schemastore.org/claude-code-settings.json",
            "env": {
              "ANTHROPIC_BASE_URL": "${{ vars.CLAUDE_BASEURL }}",
              "ANTHROPIC_AUTH_TOKEN": "$ANTHROPIC_AUTH_TOKEN",
              "ANTHROPIC_MODEL": "deepseek-v4-pro",
              "CLAUDE_CODE_NEW_INIT": "1",
              "DISABLE_AUTOUPDATER": "1"
            },
            "permissions": { "defaultMode": "bypassPermissions" },
            "skipDangerousModePermissionPrompt": true
          }
          SETEOF

      - name: Smoke test — claude --print
        if: steps.check.outputs.skip == 'false'
        run: |
          echo "=== 网络可达性检查 ==="
          curl -sS -o /dev/null -w "HTTP %{http_code} (%{time_total}s)\n" "$ANTHROPIC_BASE_URL" || echo "curl 失败: $?"
          echo ""
          echo "=== 验证 claude 基础连通性 ==="
          timeout 120 claude --print --output-format text "say OK" 2>&1 || {
            rc=$?
            echo "claude 退出码: $rc (124=超时)"
          }
        timeout-minutes: 3
        env:
          ANTHROPIC_BASE_URL: ${{ vars.CLAUDE_BASEURL }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.CLAUDE_APIKEY }}
          ANTHROPIC_MODEL: deepseek-v4-flash
