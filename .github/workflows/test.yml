name: Test setup.sh

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: Verify setup.sh on ubuntu-24.04
    runs-on: ubuntu-24.04
    env:
      REPO_ROOT: ${{ github.workspace }}

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify user ECC scope requires selection
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -r "$tmp"' EXIT

          output=$(CLAUDE_CONFIG_DIR="$tmp" ./setup.sh --dry-run --no-claude --no-verify 2>&1)
          echo "$output"

          printf '%s\n' "$output" | grep -q 'ECC 需要选择安装范围'
          printf '%s\n' "$output" | grep -q '未选择 ECC 安装范围，跳过 ECC 官方安装器'
          printf '%s\n' "$output" | grep -q -- './setup.sh --ecc-focused'
          printf '%s\n' "$output" | grep -q -- './setup.sh --ecc-profile <name>'
          printf '%s\n' "$output" | grep -q -- './setup.sh --ecc-modules <id,id,...>'
          if printf '%s\n' "$output" | grep -q -- 'ECC 默认安装范围\|npm install ECC\|--modules rules-core,agents-core\|--profile full'; then
            echo "FAIL: 用户默认路径不应自动安装或选择 ECC 安装范围"
            exit 1
          fi

      - name: Run setup.sh smoke test
        run: |
          chmod +x ./setup.sh
          ./setup.sh --ci --smoke-test
        env:
          REPO_ROOT: ${{ github.workspace }}
          CLAUDE_BASE_URL: ${{ vars.CLAUDE_BASEURL }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_APIKEY }}
          CLAUDE_MODEL: deepseek-v4-flash

      - name: Verify idempotency with second run
        run: |
          set -euo pipefail
          echo "=== 第二次运行 (应主要走已就绪路径) ==="
          output=$(./setup.sh --ci 2>&1)
          echo "$output"

          pass_count=$(printf '%s\n' "$output" | grep -c '\[PASS\]' || true)
          echo "检测到 $pass_count 个 [PASS] 标记"
          if [[ "$pass_count" -lt 4 ]]; then
            echo "FAIL: 第二次运行没有体现足够的幂等性"
            exit 1
          fi
        env:
          REPO_ROOT: ${{ github.workspace }}
          CLAUDE_BASE_URL: ${{ vars.CLAUDE_BASEURL }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_APIKEY }}
          CLAUDE_MODEL: deepseek-v4-flash
